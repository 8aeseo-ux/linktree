<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>GAUSSIAN SPLATTING</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="gaussian-page">
	<main class="dotori-main gaussian-main">
		<a class="back-link" href="index.html">← back</a>

		<section class="dotori-hero gaussian-hero" aria-labelledby="gaussian-title">
		</section>

		<section class="dotori-section gaussian-viewer-section" aria-labelledby="viewer-title">
			<h2 id="viewer-title">직접 조작해보기</h2>
			<div class="gaussian-viewer gaussian-original-viewer">
				<iframe
					src="https://cdn.jsdelivr.net/gh/8aeseo-ux/linktree@main/spark-tunnel-viewer.html?clean=1"
					title="Spark Gaussian Splatting Tunnel Viewer"
					allow="fullscreen"
				></iframe>
			</div>
			<p class="gaussian-guide">drag to orbit · click cinematic pull · adjust the tunnel controls</p>
		</section>

		<section class="dotori-section instagram-section" aria-labelledby="instagram-title">
			<h2 id="instagram-title">instagram post</h2>
			<div class="instagram-embed-wrap">
				<blockquote
					class="instagram-media"
					data-instgrm-permalink="https://www.instagram.com/p/DaqVgg5ksV6/?img_index=1"
					data-instgrm-version="14"
					style="background:#fff; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin:1px; max-width:540px; min-width:326px; padding:0; width:calc(100% - 2px);"
				>
					<div style="padding:16px;">
						<a
							href="https://www.instagram.com/p/DaqVgg5ksV6/?img_index=1"
							target="_blank"
							rel="noopener noreferrer"
							style="background:#fff; line-height:0; padding:0; text-align:center; text-decoration:none; width:100%;"
						>
							Instagram에서 게시물 보기
						</a>
					</div>
				</blockquote>
			</div>
		</section>

		<section class="dotori-section gaussian-video-section" aria-labelledby="video-title">
			<h2 id="video-title">작업 기록 영상</h2>
			<div class="gaussian-video-grid">
				<figure class="gaussian-video-card">
					<video controls muted playsinline preload="metadata">
						<source src="https://raw.githubusercontent.com/8aeseo-ux/linktree/main/assets/gaussian-demo-wide.mp4" type="video/mp4">
						이 브라우저에서는 영상을 재생할 수 없습니다.
					</video>
					<figcaption>process 01</figcaption>
				</figure>
				<figure class="gaussian-video-card">
					<video controls muted playsinline preload="metadata">
						<source src="https://raw.githubusercontent.com/8aeseo-ux/linktree/main/assets/gaussian-demo-vertical.mp4" type="video/mp4">
						이 브라우저에서는 영상을 재생할 수 없습니다.
					</video>
					<figcaption>process 02</figcaption>
				</figure>
			</div>
		</section>
	</main>
	<script async src="https://www.instagram.com/embed.js"></script>
</body>
</html>
