<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>GAUSSIAN SPLATTING</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="gaussian-page">
	<main class="dotori-main gaussian-main">
		<a class="back-link" href="index.html">← back</a>

		<section class="dotori-hero gaussian-hero" aria-labelledby="gaussian-title">
			<p class="dotori-kicker">interactive web viewer</p>
			<h1 id="gaussian-title">GAUSSIAN SPLATTING</h1>
		</section>

		<section class="dotori-section gaussian-viewer-section" aria-labelledby="viewer-title">
			<h2 id="viewer-title">직접 조작해보기</h2>
			<div class="gaussian-viewer" data-gaussian-viewer>
				<canvas class="gaussian-canvas" data-gaussian-canvas aria-label="가우시안 스플래팅 인터랙티브 3D 프리뷰"></canvas>
				<p class="gaussian-loading" data-gaussian-status>loading splats...</p>
			</div>
			<div class="gaussian-controls" aria-label="가우시안 스플래팅 조작 도구">
				<label>
					<span>density</span>
					<input data-density-control type="range" min="600" max="3600" step="100" value="2600">
				</label>
				<label>
					<span>splat size</span>
					<input data-size-control type="range" min="3" max="18" step="1" value="9">
				</label>
				<button class="gaussian-button" type="button" data-reset-view>reset view</button>
			</div>
			<p class="gaussian-guide">drag to rotate · scroll to zoom · change density</p>
		</section>
	</main>

	<script type="module">
		const viewer = document.querySelector("[data-gaussian-viewer]");
		const canvas = document.querySelector("[data-gaussian-canvas]");
		const status = document.querySelector("[data-gaussian-status]");
		const densityControl = document.querySelector("[data-density-control]");
		const sizeControl = document.querySelector("[data-size-control]");
		const resetButton = document.querySelector("[data-reset-view]");

		let renderer;
		let scene;
		let camera;
		let cloud;
		let animationFrame;
		let targetRotationX = -0.12;
		let targetRotationY = 0.55;
		let zoom = 4.4;
		let isDragging = false;
		let lastPointer = { x: 0, y: 0 };

		function makeGaussianTexture(THREE) {
			const textureCanvas = document.createElement("canvas");
			textureCanvas.width = 96;
			textureCanvas.height = 96;
			const context = textureCanvas.getContext("2d");
			const gradient = context.createRadialGradient(48, 48, 2, 48, 48, 46);
			gradient.addColorStop(0, "rgba(249, 115, 22, 0.95)");
			gradient.addColorStop(0.45, "rgba(249, 115, 22, 0.36)");
			gradient.addColorStop(1, "rgba(249, 115, 22, 0)");
			context.fillStyle = gradient;
			context.fillRect(0, 0, 96, 96);
			return new THREE.CanvasTexture(textureCanvas);
		}

		function makeCloud(THREE, texture) {
			const maxPoints = 3600;
			const positions = new Float32Array(maxPoints * 3);
			const colors = new Float32Array(maxPoints * 3);

			for (let i = 0; i < maxPoints; i += 1) {
				const t = i / maxPoints;
				const angle = t * Math.PI * 24;
				const petal = 0.72 + Math.sin(angle * 1.7) * 0.22;
				const radius = Math.sqrt(t) * petal * 1.28;
				const noise = (Math.random() - 0.5) * 0.34;
				const y = (Math.random() - 0.5) * 1.72 + Math.sin(angle * 0.6) * 0.18;
				const z = Math.sin(angle) * radius * 0.72 + noise;
				const x = Math.cos(angle) * radius + (Math.random() - 0.5) * 0.22;

				positions[i * 3] = x;
				positions[i * 3 + 1] = y;
				positions[i * 3 + 2] = z;

				colors[i * 3] = 1;
				colors[i * 3 + 1] = 0.28 + Math.random() * 0.24;
				colors[i * 3 + 2] = 0.06 + Math.random() * 0.12;
			}

			const geometry = new THREE.BufferGeometry();
			geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
			geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
			geometry.setDrawRange(0, Number(densityControl.value));

			const material = new THREE.PointsMaterial({
				size: Number(sizeControl.value) / 100,
				map: texture,
				vertexColors: true,
				transparent: true,
				depthWrite: false,
				blending: THREE.AdditiveBlending
			});

			return new THREE.Points(geometry, material);
		}

		function resize() {
			if (!renderer || !camera || !viewer) return;
			const rect = viewer.getBoundingClientRect();
			renderer.setSize(rect.width, rect.height, false);
			camera.aspect = rect.width / rect.height;
			camera.updateProjectionMatrix();
		}

		function animate() {
			if (!renderer || !scene || !camera || !cloud) return;
			cloud.rotation.x += (targetRotationX - cloud.rotation.x) * 0.08;
			cloud.rotation.y += (targetRotationY - cloud.rotation.y) * 0.08;
			cloud.rotation.z += 0.0015;
			camera.position.z += (zoom - camera.position.z) * 0.08;
			renderer.render(scene, camera);
			animationFrame = requestAnimationFrame(animate);
		}

		function bindControls() {
			canvas.addEventListener("pointerdown", (event) => {
				isDragging = true;
				lastPointer = { x: event.clientX, y: event.clientY };
				canvas.setPointerCapture(event.pointerId);
			});

			canvas.addEventListener("pointermove", (event) => {
				if (!isDragging) return;
				const dx = event.clientX - lastPointer.x;
				const dy = event.clientY - lastPointer.y;
				targetRotationY += dx * 0.008;
				targetRotationX += dy * 0.008;
				lastPointer = { x: event.clientX, y: event.clientY };
			});

			canvas.addEventListener("pointerup", () => {
				isDragging = false;
			});

			canvas.addEventListener("wheel", (event) => {
				event.preventDefault();
				zoom = Math.min(7.2, Math.max(2.4, zoom + event.deltaY * 0.004));
			}, { passive: false });

			densityControl.addEventListener("input", () => {
				cloud.geometry.setDrawRange(0, Number(densityControl.value));
			});

			sizeControl.addEventListener("input", () => {
				cloud.material.size = Number(sizeControl.value) / 100;
			});

			resetButton.addEventListener("click", () => {
				targetRotationX = -0.12;
				targetRotationY = 0.55;
				zoom = 4.4;
				densityControl.value = "2600";
				sizeControl.value = "9";
				cloud.geometry.setDrawRange(0, 2600);
				cloud.material.size = 0.09;
			});
		}

		async function init() {
			const THREE = await import("https://unpkg.com/three@0.160.0/build/three.module.js");
			renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
			renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
			scene = new THREE.Scene();
			camera = new THREE.PerspectiveCamera(48, 1, 0.1, 100);
			camera.position.set(0, 0, zoom);

			const texture = makeGaussianTexture(THREE);
			cloud = makeCloud(THREE, texture);
			scene.add(cloud);

			const glow = new THREE.PointLight(0xf97316, 4, 8);
			glow.position.set(1.8, 1.4, 3);
			scene.add(glow);

			status.hidden = true;
			resize();
			bindControls();
			window.addEventListener("resize", resize);
			animate();
		}

		init().catch(() => {
			if (animationFrame) cancelAnimationFrame(animationFrame);
			status.textContent = "viewer could not load. please refresh.";
		});
	</script>
</body>
</html>
