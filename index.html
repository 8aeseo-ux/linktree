<!doctype html>
<html lang="ko" id="top">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>배서연의 나와바리</title>
	<link rel="icon" type="image/png" href="hamster.png">
	<link rel="apple-touch-icon" href="hamster.png">
	  <link rel="stylesheet" href="style.css">
	
</head>
<body>
	<!-- Change --image-width to resize the top image. Example: 150px, 220px, 30vw -->
	<main class="linktree" style="--image-width: 210px;">
		<button class="spring-button" type="button" data-spring-button aria-label="동글이">
			<img class="logo" src="hamster.png" alt="동글이">
		</button>

		<div class="links" aria-label="Wikibird 링크 목록">

			<!-- Copy an a.link-card block below to add more links. -->
			
			<a class="link-card" href="새교과6월22일/index.html">
			<span class="link-title">배서연</span>
			</a>

			<a class="link-card" href="dotori.html">
			<span class="link-title">dotori</span>
			</a>

			<a class="link-card" href="gaussian.html">
			<span class="link-title">가우시안 스플래팅</span>
			</a>

			<a class="link-card" href="#">
			<span class="link-title">dj dochi</span>
			</a>
			

		</div>
	</main>
	<script>
		(() => {
			const springButton = document.querySelector("[data-spring-button]");
			if (!springButton) return;

			let currentAnimation;
			const jumpKeyframes = [
				{ transform: "translateY(0)" },
				{ transform: "translateY(-52px)" },
				{ transform: "translateY(0)" }
			];

			const reducedMotionKeyframes = [
				{ opacity: 1 },
				{ opacity: 0.82 },
				{ opacity: 1 }
			];

			function jump() {
				currentAnimation?.cancel();

				if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
					currentAnimation = springButton.animate(reducedMotionKeyframes, {
						duration: 160,
						easing: "ease-out"
					});
					return;
				}

				currentAnimation = springButton.animate(jumpKeyframes, {
					duration: 440,
					easing: "cubic-bezier(.25, .8, .35, 1)"
				});
			}

			springButton.addEventListener("click", jump);
		})();
	</script>
</body>
</html>
